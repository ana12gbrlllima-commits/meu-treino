<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Meu Treino</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0d0e10;
      --surface: #18191d;
      --surface2: #22242a;
      --accent: #FF5C3A;
      --accent-soft: rgba(255,92,58,0.12);
      --text: #f0f0f2;
      --muted: #6e7079;
      --border: rgba(255,255,255,0.07);
      --success: #3ecf6e;
      --success-soft: rgba(62,207,110,0.12);
      --purple: #8B7FE8;
      --teal: #3CC8B4;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.5; overflow-x: hidden; }

    #app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; }

    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── HOME ── */
    .home-header { padding: 52px 20px 20px; }
    .home-header .greeting { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
    .home-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 46px; letter-spacing: 0.02em; line-height: 1; }
    .home-header h1 span { color: var(--accent); }

    .status-bar { display: flex; align-items: center; gap: 6px; padding: 0 20px 18px; font-size: 12px; color: var(--muted); }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
    .sync-dot.syncing { background: var(--accent); animation: pulse-dot 1s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .today-banner { margin: 0 20px 24px; background: var(--accent-soft); border: 1px solid rgba(255,92,58,0.4); border-radius: 16px; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background 0.15s; }
    .today-banner:active { background: rgba(255,92,58,0.22); }
    .today-banner.rest { background: rgba(255,255,255,0.03); border-color: var(--border); cursor: default; }
    .today-banner .tb-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 4px; }
    .today-banner.rest .tb-label { color: var(--muted); }
    .today-banner .tb-name { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.02em; line-height: 1.1; margin-bottom: 2px; }
    .today-banner .tb-sub { font-size: 13px; color: var(--muted); }
    .today-banner .tb-arrow { width: 44px; height: 44px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .today-banner.rest .tb-arrow { background: var(--surface2); }

    .section-title { padding: 0 20px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

    .week-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px 40px; }

    .day-card { background: var(--surface); border-radius: 14px; padding: 14px 12px; cursor: pointer; border: 1px solid var(--border); transition: transform 0.12s; position: relative; overflow: hidden; }
    .day-card:active { transform: scale(0.96); }
    .day-card.today { border-color: rgba(255,92,58,0.5); background: var(--accent-soft); }
    .day-card.done::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--success); }
    .dc-short { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 5px; }
    .day-card.today .dc-short { color: var(--accent); }
    .dc-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.02em; line-height: 1.1; margin-bottom: 6px; }
    .dc-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
    .tag-a { background: rgba(139,127,232,0.18); color: #b0a8f0; }
    .tag-b { background: rgba(60,200,180,0.18); color: #5dd9c8; }
    .tag-c { background: rgba(255,92,58,0.18); color: #ff8a74; }
    .dc-status { position: absolute; top: 10px; right: 10px; font-size: 13px; }
    .dc-duration { font-size: 11px; color: var(--muted); margin-top: 5px; }

    /* ── WORKOUT ── */
    .workout-nav { display: flex; align-items: center; gap: 14px; padding: 52px 20px 16px; }
    .back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.12s; }
    .back-btn:active { background: var(--surface2); }
    .wn-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 2px; }
    .wn-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.02em; line-height: 1.1; }

    .timer-section { padding: 8px 20px 22px; text-align: center; }
    .timer-display { font-family: 'Bebas Neue', sans-serif; font-size: 96px; letter-spacing: 0.04em; line-height: 1; color: var(--text); margin-bottom: 18px; transition: color 0.3s; user-select: none; }
    .timer-display.running { color: var(--accent); }
    .timer-display.finished { color: var(--success); }

    .timer-controls { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .timer-btn { height: 46px; border-radius: 100px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; transition: transform 0.12s; }
    .timer-btn:active { transform: scale(0.96); }
    .timer-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .timer-btn.primary { background: var(--accent); color: white; padding: 0 32px; min-width: 140px; }
    .timer-btn.secondary { background: var(--surface2); color: var(--muted); padding: 0 22px; border: 1px solid var(--border); }

    .progress-section { padding: 0 20px 18px; }
    .progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .pm-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
    .pm-count { font-size: 13px; font-weight: 600; color: var(--text); }
    .progress-track { height: 4px; background: var(--surface2); border-radius: 100px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width 0.35s ease, background 0.3s; }
    .progress-fill.full { background: var(--success); }

    .exercise-list { flex: 1; overflow-y: auto; padding: 0 20px 130px; }

    .ex-section { margin-bottom: 22px; }
    .ex-sec-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }

    .ex-item { display: flex; align-items: center; gap: 14px; padding: 13px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.25s; }
    .ex-item:last-child { border-bottom: none; }
    .ex-item.checked { opacity: 0.45; }

    .ex-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--surface2); background: var(--surface2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
    .ex-item.checked .ex-check { background: var(--success); border-color: var(--success); }
    .check-icon { width: 14px; height: 14px; opacity: 0; transition: opacity 0.2s; }
    .ex-item.checked .check-icon { opacity: 1; }

    .ex-info { flex: 1; min-width: 0; }
    .ex-name { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; }
    .ex-item.checked .ex-name { text-decoration: line-through; }
    .ex-sets { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .workout-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; padding: 16px 20px 36px; background: linear-gradient(to top, var(--bg) 65%, transparent); pointer-events: none; }
    .finish-btn { width: 100%; height: 56px; border-radius: 16px; border: none; background: var(--accent); color: white; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.15s; letter-spacing: 0.01em; pointer-events: all; }
    .finish-btn:active { transform: scale(0.98); }
    .finish-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; transform: none; }
    .finish-btn.done { background: var(--success); cursor: default; }

    /* ── SUMMARY ── */
    .summary-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
    .summary-icon { width: 84px; height: 84px; border-radius: 50%; background: var(--success-soft); border: 2px solid var(--success); display: flex; align-items: center; justify-content: center; margin-bottom: 28px; }
    .summary-title { font-family: 'Bebas Neue', sans-serif; font-size: 46px; letter-spacing: 0.02em; line-height: 1; margin-bottom: 8px; }
    .summary-sub { font-size: 14px; color: var(--muted); margin-bottom: 36px; }
    .summary-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 300px; margin-bottom: 44px; }
    .stat-card { background: var(--surface); border-radius: 14px; padding: 18px 16px; border: 1px solid var(--border); }
    .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 0.02em; color: var(--accent); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
    .home-btn { width: 100%; max-width: 300px; height: 54px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .home-btn:active { background: var(--surface2); }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(14px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 22px; border-radius: 100px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.28s; pointer-events: none; white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="home-header">
      <div class="greeting">Bora treinar,</div>
      <h1>ANA <span>GABRIELLA</span></h1>
    </div>
    <div class="status-bar">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">Carregando...</span>
    </div>
    <div id="today-banner" class="today-banner">
      <div>
        <div class="tb-label" id="today-label">Treino de hoje</div>
        <div class="tb-name" id="today-name">—</div>
        <div class="tb-sub" id="today-sub">—</div>
      </div>
      <div class="tb-arrow" id="today-arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
    <div class="section-title">Semana completa</div>
    <div class="week-grid" id="week-grid"></div>
  </div>

  <!-- WORKOUT -->
  <div id="screen-workout" class="screen">
    <div class="workout-nav">
      <div class="back-btn" onclick="goHome()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div>
        <div class="wn-label" id="wn-label">Treino</div>
        <div class="wn-title" id="wn-title">—</div>
      </div>
    </div>

    <div class="timer-section">
      <div class="timer-display" id="timer-display">00:00</div>
      <div class="timer-controls">
        <button class="timer-btn secondary" onclick="resetTimer()">Resetar</button>
        <button class="timer-btn primary" id="timer-btn" onclick="toggleTimer()">Iniciar</button>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-meta">
        <span class="pm-label">Progresso</span>
        <span class="pm-count" id="progress-count">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="exercise-list" id="exercise-list"></div>

    <div class="workout-footer">
      <button class="finish-btn" id="finish-btn" onclick="finishWorkout()" disabled>
        Finalizar Treino
      </button>
    </div>
  </div>

  <!-- SUMMARY -->
  <div id="screen-summary" class="screen">
    <div class="summary-wrap">
      <div class="summary-icon">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#3ecf6e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="summary-title">TREINO FEITO!</div>
      <div class="summary-sub" id="sum-sub">—</div>
      <div class="summary-stats">
        <div class="stat-card">
          <div class="stat-val" id="sum-duration">—</div>
          <div class="stat-label">Duração</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="sum-exercises">—</div>
          <div class="stat-label">Exercícios</div>
        </div>
      </div>
      <button class="home-btn" onclick="goHome()">Voltar ao início</button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── Firebase ────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyB-rikqhsnKbrQ-XlWOdnCw-S8lch_kTLI",
  authDomain: "atelie-estudos.firebaseapp.com",
  projectId: "atelie-estudos",
  storageBucket: "atelie-estudos.firebasestorage.app",
  messagingSenderId: "494720347993",
  appId: "1:494720347993:web:774a4858ccbe4ed3c92648"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── Device ID ────────────────────────────────────────────────────────────────
let deviceId = localStorage.getItem('treino_uid');
if (!deviceId) {
  deviceId = 'ana_' + Date.now().toString(36) + Math.random().toString(36).substr(2,5);
  localStorage.setItem('treino_uid', deviceId);
}

// ── Workout Data ─────────────────────────────────────────────────────────────
const DAYS = [
  { name:'Segunda', short:'Seg', treino:'A', tag:'tag-a', title:'Peito + Ombro + Tríceps', sections:[
    { name:'Peito', exs:[
      {id:'seg_sup_halt', name:'Supino com halteres', sets:'3 × 15 reps'},

    ]},

    ]},
  ]},
  { name:'Terça', short:'Ter', treino:'B', tag:'tag-b', title:'Costas + Bíceps', sections:[
    { name:'Costas', exs:[
      {id:'ter_pulley',  name:'Puxada na polia (pulley)',    sets:'3 × 15 reps'},
      {id:'ter_rem_sent',name:'Remada sentada na polia',     sets:'3 × 15 reps'},
      {id:'ter_rem_uni', name:'Remada unilateral c/ haltere',sets:'3 × 12 reps'},
    ]},
    { name:'Bíceps', exs:[
      {id:'ter_rosca_h', name:'Rosca com halteres alternada',sets:'3 × 15 reps'},
      {id:'ter_rosca_p', name:'Rosca na polia (cabo baixo)', sets:'3 × 15 reps'},
    ]},
    { name:'Cardio', exs:[
      {id:'ter_cardio', name:'Bicicleta ergométrica', sets:'30 minutos'},
    ]},
  ]},
  { name:'Quarta', short:'Qua', treino:'C', tag:'tag-c', title:'Pernas + Abdômen', sections:[
    { name:'Pernas', exs:[
      {id:'qua_agach',   name:'Agachamento livre (leve)',       sets:'3 × 15 reps'},
      {id:'qua_cad_ext', name:'Cadeira extensora',              sets:'3 × 15 reps'},
      {id:'qua_cad_flex',name:'Cadeira flexora',                sets:'3 × 15 reps'},
      {id:'qua_pant',    name:'Elevação de panturrilha em pé',  sets:'3 × 20 reps'},
    ]},
    { name:'Abdômen', exs:[
      {id:'qua_crunch', name:'Crunch no chão',                  sets:'3 × 20 reps'},
      {id:'qua_pinguim',name:'Pinguim (oblíquos)',               sets:'3 × 20 reps'},
      {id:'qua_elev_p', name:'Elevação de pernas (toca o pé)',  sets:'3 × 15 reps'},
    ]},
    { name:'Cardio', exs:[
      {id:'qua_cardio', name:'Bicicleta ergométrica', sets:'30 minutos'},
    ]},
  ]},
  { name:'Quinta', short:'Qui', treino:'A', tag:'tag-a', title:'Peito + Ombro + Tríceps', sections:[
    { name:'Peito', exs:[
      {id:'qui_sup_halt', name:'Supino com halteres', sets:'3 × 15 reps'},
      {id:'qui_voador',   name:'Voador (peck deck)',  sets:'3 × 15 reps'},
    ]},
    { name:'Ombro', exs:[
      {id:'qui_desenv',  name:'Desenvolvimento c/ halteres', sets:'3 × 12 reps'},
      {id:'qui_elev_lat',name:'Elevação lateral c/ halteres',sets:'3 × 15 reps'},
    ]},
    { name:'Tríceps', exs:[
      {id:'qui_tri_cord', name:'Tríceps corda na polia',    sets:'3 × 15 reps'},

    ]},

  { name:'Sexta', short:'Sex', treino:'B', tag:'tag-b', title:'Costas + Bíceps', sections:[
    { name:'Costas', exs:[
      {id:'sex_pulley',  name:'Puxada na polia (pulley)',    sets:'3 × 15 reps'},
      {id:'sex_rem_sent',name:'Remada sentada na polia',     sets:'3 × 15 reps'},
      {id:'sex_rem_uni', name:'Remada unilateral c/ haltere',sets:'3 × 12 reps'},
    ]},
    { name:'Bíceps', exs:[
      {id:'sex_rosca_h', name:'Rosca com halteres alternada',sets:'3 × 15 reps'},
      {id:'sex_rosca_p', name:'Rosca na polia (cabo baixo)', sets:'3 × 15 reps'},
    ]},
    { name:'Cardio', exs:[
      {id:'sex_cardio', name:'Bicicleta ergométrica', sets:'30 minutos'},
    ]},
  ]},
  { name:'Sábado', short:'Sáb', treino:'C', tag:'tag-c', title:'Pernas + Abdômen', sections:[
    { name:'Pernas', exs:[
      {id:'sab_agach',   name:'Agachamento livre (leve)',       sets:'3 × 15 reps'},
      {id:'sab_cad_ext', name:'Cadeira extensora',              sets:'3 × 15 reps'},
      {id:'sab_cad_flex',name:'Cadeira flexora',                sets:'3 × 15 reps'},
      {id:'sab_pant',    name:'Elevação de panturrilha em pé',  sets:'3 × 20 reps'},
    ]},
    { name:'Abdômen', exs:[
      {id:'sab_crunch', name:'Crunch no chão',                  sets:'3 × 20 reps'},
      {id:'sab_pinguim',name:'Pinguim (oblíquos)',               sets:'3 × 20 reps'},
      {id:'sab_elev_p', name:'Elevação de pernas (toca o pé)',  sets:'3 × 15 reps'},
    ]},
    { name:'Cardio', exs:[
      {id:'sab_cardio', name:'Bicicleta ergométrica', sets:'30 minutos'},
    ]},
  ]},
];
DAYS.forEach(d => { d.total = d.sections.reduce((s,sec) => s + sec.exs.length, 0); });

// ── State ─────────────────────────────────────────────────────────────────────
let currentDay = -1;
let checked = new Set();
let timerInterval = null;
let timerStartMs = null;
let timerElapsed = 0; // seconds banked before current run
let timerRunning = false;
let workoutDone = false;
let cache = {}; // dayIndex -> session doc
let saveTimer = null;

// ── Timer ─────────────────────────────────────────────────────────────────────
function toggleTimer() {
  timerRunning ? pauseTimer() : startTimer();
}
function startTimer() {
  if (timerRunning || workoutDone) return;
  timerRunning = true;
  timerStartMs = Date.now();
  document.getElementById('timer-btn').textContent = 'Pausar';
  document.getElementById('timer-display').classList.add('running');
  timerInterval = setInterval(tickTimer, 1000);
  tickTimer();
}
function pauseTimer() {
  if (!timerRunning) return;
  timerRunning = false;
  timerElapsed += Math.floor((Date.now() - timerStartMs) / 1000);
  timerStartMs = null;
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timer-btn').textContent = 'Continuar';
  document.getElementById('timer-display').classList.remove('running');
}
function resetTimer() {
  pauseTimer();
  timerElapsed = 0;
  timerStartMs = null;
  document.getElementById('timer-display').textContent = '00:00';
  document.getElementById('timer-display').classList.remove('running','finished');
  document.getElementById('timer-btn').textContent = 'Iniciar';
}
function getSeconds() {
  if (timerRunning && timerStartMs) return timerElapsed + Math.floor((Date.now() - timerStartMs) / 1000);
  return timerElapsed;
}
function tickTimer() {
  const s = getSeconds();
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const ss = s % 60;
  const str = h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`
    : `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  const el = document.getElementById('timer-display');
  if (el) el.textContent = str;
}
function fmtTime(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
  return h>0 ? `${h}h${String(m).padStart(2,'0')}m` : `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

// ── Firestore ─────────────────────────────────────────────────────────────────
function setSyncing(on) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (!dot || !lbl) return;
  dot.className = on ? 'sync-dot syncing' : 'sync-dot';
  lbl.textContent = on ? 'Sincronizando...' : 'Sincronizado';
}

function todayStr() { return new Date().toISOString().split('T')[0]; }

function docId(dayIdx) {
  // Use week-relative date for each day slot
  const todayJSDay = new Date().getDay(); // 0=Sun
  const todayIdx = todayJSDay === 0 ? -1 : todayJSDay - 1;
  const d = new Date();
  d.setDate(d.getDate() + (dayIdx - todayIdx));
  return `${deviceId}_${d.toISOString().split('T')[0]}_d${dayIdx}`;
}

async function saveDoc(dayIdx, data) {
  setSyncing(true);
  try { await db.collection('treino_sessions').doc(docId(dayIdx)).set(data, {merge:true}); }
  catch(e) { console.error(e); }
  setSyncing(false);
}

async function loadDoc(dayIdx) {
  try {
    const snap = await db.collection('treino_sessions').doc(docId(dayIdx)).get();
    return snap.exists ? snap.data() : null;
  } catch(e) { return null; }
}

async function loadAll() {
  const res = await Promise.all(DAYS.map((_,i) => loadDoc(i)));
  res.forEach((d,i) => { if (d) cache[i] = d; });
}

// ── Checklist ─────────────────────────────────────────────────────────────────
function toggleEx(id) {
  if (workoutDone) return;
  checked.has(id) ? checked.delete(id) : checked.add(id);
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) el.classList.toggle('checked', checked.has(id));
  updateProgress();
  scheduleSave();
}

function updateProgress() {
  const total = DAYS[currentDay].total;
  const done = checked.size;
  document.getElementById('progress-count').textContent = `${done} / ${total}`;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.classList.toggle('full', done === total);
  const btn = document.getElementById('finish-btn');
  if (!workoutDone) btn.disabled = done === 0;
}

function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveDoc(currentDay, {
      deviceId, dayIndex: currentDay,
      dayName: DAYS[currentDay].name,
      checkedExercises: [...checked],
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
  }, 1200);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  if (timerRunning) pauseTimer();
  clearInterval(timerInterval);
  currentDay = -1; workoutDone = false;
  renderHome();
  show('screen-home');
}

async function openDay(idx) {
  currentDay = idx;
  checked = new Set();
  timerElapsed = 0; timerStartMs = null;
  timerRunning = false; workoutDone = false;
  clearInterval(timerInterval); timerInterval = null;

  const day = DAYS[idx];

  // Load session
  setSyncing(true);
  const existing = await loadDoc(idx);
  setSyncing(false);
  if (existing) {
    cache[idx] = existing;
    (existing.checkedExercises || []).forEach(id => checked.add(id));
    if (existing.completed) {
      workoutDone = true;
      timerElapsed = existing.durationSeconds || 0;
    } else if (existing.durationSeconds) {
      timerElapsed = existing.durationSeconds;
    }
  }

  // Header
  document.getElementById('wn-label').textContent = `Treino ${day.treino} — ${day.name}`;
  document.getElementById('wn-title').textContent = day.title;

  // Timer
  const tDisp = document.getElementById('timer-display');
  const tBtn  = document.getElementById('timer-btn');
  tDisp.textContent = fmtTime(timerElapsed);
  tDisp.className = 'timer-display' + (workoutDone ? ' finished' : '');
  tBtn.textContent = workoutDone ? 'Concluído' : (timerElapsed > 0 ? 'Continuar' : 'Iniciar');
  tBtn.disabled = workoutDone;

  // Exercises
  const list = document.getElementById('exercise-list');
  list.innerHTML = day.sections.map(sec => `
    <div class="ex-section">
      <div class="ex-sec-title">${sec.name}</div>
      ${sec.exs.map(ex => `
        <div class="ex-item ${checked.has(ex.id)?'checked':''}" data-id="${ex.id}" onclick="toggleEx('${ex.id}')">
          <div class="ex-check">
            <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-sets">${ex.sets}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');

  updateProgress();

  // Finish button
  const finBtn = document.getElementById('finish-btn');
  if (workoutDone) {
    finBtn.textContent = 'Treino já concluído hoje!';
    finBtn.disabled = true;
    finBtn.className = 'finish-btn done';
  } else {
    finBtn.textContent = 'Finalizar Treino';
    finBtn.disabled = checked.size === 0;
    finBtn.className = 'finish-btn';
  }

  show('screen-workout');
}

// ── Finish ────────────────────────────────────────────────────────────────────
async function finishWorkout() {
  if (workoutDone) return;
  if (timerRunning) pauseTimer();
  const secs = getSeconds();
  const day = DAYS[currentDay];
  workoutDone = true;

  document.getElementById('timer-display').classList.remove('running');
  document.getElementById('timer-display').classList.add('finished');
  document.getElementById('timer-btn').textContent = 'Concluído';
  document.getElementById('timer-btn').disabled = true;

  setSyncing(true);
  await saveDoc(currentDay, {
    deviceId, dayIndex: currentDay,
    dayName: day.name, title: day.title,
    checkedExercises: [...checked],
    durationSeconds: secs,
    exercisesDone: checked.size,
    exercisesTotal: day.total,
    completed: true,
    completedAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
  setSyncing(false);

  cache[currentDay] = { completed: true, durationSeconds: secs, exercisesDone: checked.size, exercisesTotal: day.total };

  // Summary
  document.getElementById('sum-sub').textContent = `${day.name} — ${day.title}`;
  document.getElementById('sum-duration').textContent = fmtTime(secs);
  document.getElementById('sum-exercises').textContent = `${checked.size}/${day.total}`;

  show('screen-summary');
}

// ── Home render ───────────────────────────────────────────────────────────────
function renderHome() {
  const todayJSDay = new Date().getDay();
  const todayIdx = todayJSDay === 0 ? -1 : todayJSDay - 1;

  // Today banner
  const banner = document.getElementById('today-banner');
  const arrow  = document.getElementById('today-arrow');
  if (todayIdx === -1) {
    banner.className = 'today-banner rest';
    banner.onclick = null;
    document.getElementById('today-label').textContent = 'Domingo';
    document.getElementById('today-name').textContent = 'Dia de descanso';
    document.getElementById('today-sub').textContent = 'Você merece descansar hoje!';
    arrow.style.background = 'var(--surface2)';
  } else {
    const day = DAYS[todayIdx];
    const cached = cache[todayIdx];
    banner.className = 'today-banner';
    banner.onclick = () => openDay(todayIdx);
    document.getElementById('today-label').textContent = 'Treino de hoje';
    document.getElementById('today-name').textContent = `${day.name} — Treino ${day.treino}`;
    document.getElementById('today-sub').textContent = cached && cached.completed
      ? `Concluído em ${fmtTime(cached.durationSeconds||0)} — ${day.title}`
      : day.title;
    arrow.style.background = 'var(--accent)';
  }

  // Week grid
  document.getElementById('week-grid').innerHTML = DAYS.map((day,i) => {
    const isToday = i === todayIdx;
    const cached  = cache[i];
    const isDone  = cached && cached.completed;
    const dur     = isDone ? fmtTime(cached.durationSeconds||0) : null;
    return `
      <div class="day-card ${isToday?'today':''} ${isDone?'done':''}" onclick="openDay(${i})">
        ${isDone ? '<div class="dc-status">✓</div>' : ''}
        <div class="dc-short">${day.short}</div>
        <div class="dc-name">${day.name}</div>
        <span class="dc-tag ${day.tag}">Treino ${day.treino}</span>
        ${dur ? `<div class="dc-duration">${dur}</div>` : ''}
      </div>
    `;
  }).join('');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  setSyncing(true);
  await loadAll();
  setSyncing(false);
  renderHome();
})();
</script>
