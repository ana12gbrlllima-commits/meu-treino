/* GLOBAL TIMER BAR */
.gtbar { display: none; position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; z-index: 100; background: var(--accent); padding: 8px 20px; align-items: center; justify-content: space-between; }
.gtbar.on { display: flex; }
.gtbar-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.8); }
.gtbar-time { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: white; letter-spacing: 0.05em; }
.gtbar-day { font-size: 11px; color: rgba(255,255,255,0.8); }
.gtbar-spacer { display: none; height: 40px; }
.gtbar.on ~ * .gtbar-spacer, body.has-gtbar .gtbar-spacer { display: block; }

/* HOME */
.home-header { padding: 64px 20px 20px; }
.home-header .greeting { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
.home-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 46px; letter-spacing: 0.02em; line-height: 1; }
.home-header h1 span { color: var(--accent); }
.status-bar { display: flex; align-items: center; gap: 6px; padding: 0 20px 18px; font-size: 12px; color: var(--muted); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
.sync-dot.syncing { background: var(--accent); animation: pd 1s infinite; }
@keyframes pd { 0%,100%{opacity:1} 50%{opacity:.3} }
.today-banner { margin: 0 20px 24px; background: var(--accent-soft); border: 1px solid rgba(255,92,58,.4); border-radius: 16px; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.today-banner.rest { background: rgba(255,255,255,.03); border-color: var(--border); cursor: default; }
.tb-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); margin-bottom: 4px; }
.today-banner.rest .tb-label { color: var(--muted); }
.tb-name { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: .02em; line-height: 1.1; margin-bottom: 2px; }
.tb-sub { font-size: 13px; color: var(--muted); }
.tb-arrow { width: 44px; height: 44px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.section-title { padding: 0 20px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.week-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; padding: 0 20px 40px; }
.day-card { background: var(--surface); border-radius: 14px; padding: 14px 12px; cursor: pointer; border: 1px solid var(--border); position: relative; overflow: hidden; }
.day-card.today { border-color: rgba(255,92,58,.5); background: var(--accent-soft); }
.day-card.done::before { content:''; position: absolute; top:0; left:0; right:0; height:2px; background: var(--success); }
.day-card.active-timer { border-color: rgba(255,92,58,.8); }
.dc-short { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 5px; }
.day-card.today .dc-short { color: var(--accent); }
.dc-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: .02em; line-height: 1.1; margin-bottom: 6px; }
.dc-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.tag-a { background: rgba(139,127,232,.18); color: #b0a8f0; }
.tag-b { background: rgba(60,200,180,.18); color: #5dd9c8; }
.tag-c { background: rgba(255,92,58,.18); color: #ff8a74; }
.tag-d { background: rgba(236,72,153,.18); color: #f472b6; }
.dc-status { position: absolute; top: 10px; right: 10px; font-size: 13px; }
.dc-duration { font-size: 11px; color: var(--muted); margin-top: 5px; }

/* WORKOUT */
.workout-nav { display: flex; align-items: center; gap: 14px; padding: 52px 20px 16px; }
.back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; }
.wn-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 2px; }
.wn-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: .02em; line-height: 1.1; }
.timer-section { padding: 8px 20px 22px; text-align: center; }
.timer-display { font-family: 'Bebas Neue', sans-serif; font-size: 96px; letter-spacing: .04em; line-height: 1; color: var(--text); margin-bottom: 18px; user-select: none; transition: color .3s; }
.timer-display.running { color: var(--accent); }
.timer-display.finished { color: var(--success); }
.timer-controls { display: flex; align-items: center; justify-content: center; gap: 10px; }
.timer-btn { height: 46px; border-radius: 100px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; }
.timer-btn:disabled { opacity: .4; cursor: not-allowed; }
.timer-btn.primary { background: var(--accent); color: white; padding: 0 32px; min-width: 140px; }
.timer-btn.secondary { background: var(--surface2); color: var(--muted); padding: 0 22px; border: 1px solid var(--border); }
.progress-section { padding: 0 20px 18px; }
.progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.pm-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
.pm-count { font-size: 13px; font-weight: 600; }
.progress-track { height: 4px; background: var(--surface2); border-radius: 100px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width .35s, background .3s; }
.progress-fill.full { background: var(--success); }
.exercise-list { flex: 1; overflow-y: auto; padding: 0 20px 130px; }
.ex-section { margin-bottom: 22px; }
.ex-sec-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
.ex-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.ex-item:last-child { border-bottom: none; }
.ex-item.checked { opacity: .45; }
.ex-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--surface2); background: var(--surface2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; cursor: pointer; }
.ex-item.checked .ex-check { background: var(--success); border-color: var(--success); }
.check-icon { width: 14px; height: 14px; opacity: 0; transition: opacity .2s; }
.ex-item.checked .check-icon { opacity: 1; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 15px; font-weight: 500; line-height: 1.3; }
.ex-item.checked .ex-name { text-decoration: line-through; }
.ex-sets { font-size: 12px; color: var(--muted); margin-top: 2px; }
.weight-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.weight-input { width: 56px; height: 34px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; text-align: center; padding: 0 4px; outline: none; }
.weight-input:focus { border-color: var(--accent); }
.weight-input::placeholder { color: var(--muted); font-size: 11px; }
.weight-unit { font-size: 11px; color: var(--muted); }
.workout-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; padding: 16px 20px 36px; background: linear-gradient(to top, var(--bg) 65%, transparent); pointer-events: none; }
.finish-btn { width: 100%; height: 56px; border-radius: 16px; border: none; background: var(--accent); color: white; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; pointer-events: all; }
.finish-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }
.finish-btn.done { background: var(--success); cursor: default; }
.undo-btn { width: 100%; height: 40px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; pointer-events: all; margin-top: 8px; display: none; }
.undo-btn.show { display: block; }

/* SUMMARY */
.summary-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
.summary-icon { width: 84px; height: 84px; border-radius: 50%; background: var(--success-soft); border: 2px solid var(--success); display: flex; align-items: center; justify-content: center; margin-bottom: 28px; }
.summary-title { font-family: 'Bebas Neue', sans-serif; font-size: 46px; line-height: 1; margin-bottom: 8px; }
.summary-sub { font-size: 14px; color: var(--muted); margin-bottom: 36px; }
.summary-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 300px; margin-bottom: 44px; }
.stat-card { background: var(--surface); border-radius: 14px; padding: 18px 16px; border: 1px solid var(--border); }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--accent); line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
.home-btn { width: 100%; max-width: 300px; height: 54px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; cursor: pointer; }

.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(14px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 22px; border-radius: 100px; font-size: 13px; opacity: 0; transition: all .28s; pointer-events: none; white-space: nowrap; z-index: 999; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
::-webkit-scrollbar { width: 0; }

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB-rikqhsnKbrQ-XlWOdnCw-S8lch_kTLI",
  authDomain: "atelie-estudos.firebaseapp.com",

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const deviceId = 'ana_gabriella';

// ── Week / date helpers ───────────────────────────────────────────────────────
function getWeekStart() {
  const d = new Date(), day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d); mon.setDate(d.getDate() + diff);
  return mon.toISOString().split('T')[0];
}
function todayDayIdx() { const d = new Date().getDay(); return d === 0 ? -1 : d - 1; }

// ── Data ──────────────────────────────────────────────────────────────────────
const DAYS = [
  { name:'Segunda', short:'Seg', treino:'A', tag:'tag-a', title:'Peito + Ombro + Tríceps', sections:[

    { name:'Quadríceps', exs:[{id:'ter_s1',name:'Agachamento livre (leve)',sets:'3×15'},{id:'ter_s2',name:'Cadeira extensora',sets:'3×15'},{id:'ter_s3',name:'Leg press',sets:'3×15'}]},
    { name:'Panturrilha', exs:[{id:'ter_s4',name:'Elevação de panturrilha em pé',sets:'3×20'},{id:'ter_s5',name:'Elevação de panturrilha sentada',sets:'3×20'}]},
    { name:'Cardio', exs:[{id:'ter_s6',name:'Bicicleta ergométrica',sets:'30 min'}]},
  ]},
  { name:'Quarta', short:'Qua', treino:'C', tag:'tag-c', title:'Costas + Bíceps', sections:[

  ]},
  { name:'Sábado', short:'Sáb', treino:'B', tag:'tag-b', title:'Quadríceps + Panturrilha', sections:[
    { name:'Quadríceps', exs:[{id:'sab_s1',name:'Agachamento livre (leve)',sets:'3×15'},{id:'sab_s2',name:'Cadeira extensora',sets:'3×15'},{id:'sab_s3',name:'Leg press',sets:'3×15'}]},

DAYS.forEach(d => { d.total = d.sections.reduce((s,sec) => s + sec.exs.length, 0); });

// ── State ─────────────────────────────────────────────────────────────────────
let currentDay  = -1;
let checked     = new Set();
let weights     = {};
let workoutDone = false;
let cache       = {};
let autoSaveT   = null;
let weightSaveT = null;

// ── GLOBAL TIMER ─────────────────────────────────────────────────────────────
// Persists in localStorage so it survives app close/reopen
// Keeps ticking across screen navigation
const GT = {
  running: false, elapsed: 0, startMs: null, dayIdx: -1, _iv: null,
  load() {
    try {
      const s = JSON.parse(localStorage.getItem('gtimer') || 'null');
      if (!s) return;
      this.elapsed = s.elapsed || 0;
      this.dayIdx  = s.dayIdx  !== undefined ? s.dayIdx : -1;
      this.running = s.running || false;
      this.startMs = s.startMs || null;
      // Catch up time elapsed while app was closed
      if (this.running && this.startMs) {
        this.elapsed += Math.floor((Date.now() - this.startMs) / 1000);
        this.startMs  = Date.now();
      }
    } catch(e) {}
  },
  save() {
    localStorage.setItem('gtimer', JSON.stringify({
      elapsed: this.elapsed, dayIdx: this.dayIdx,
      running: this.running, startMs: this.startMs,
    }));
  },
  seconds() {
    if (this.running && this.startMs)
      return this.elapsed + Math.floor((Date.now() - this.startMs) / 1000);
    return this.elapsed;
  },
  start(dayIdx) {
    if (this.running) return;
    if (this.dayIdx !== dayIdx) {
      // Different day — save old timer progress then reset
      if (this.dayIdx >= 0) persistTimerForDay(this.dayIdx);
      this.elapsed = 0; this.dayIdx = dayIdx;
    }
    this.running = true; this.startMs = Date.now();
    this.save(); this._tick();
  },
  pause() {
    if (!this.running) return;
    this.elapsed = this.seconds(); this.startMs = null; this.running = false;
    this.save(); updateGlobalBar();
  },
  reset() {
    this.pause();
    this.elapsed = 0; this.startMs = null; this.dayIdx = -1;
    clearInterval(this._iv); this._iv = null;
    this.save(); updateGlobalBar(); refreshTimerDisplay();
  },
  _tick() {
    if (this._iv) return;
    this._iv = setInterval(() => {
      this.save();
      updateGlobalBar();
      refreshTimerDisplay();
    }, 1000);
  },
};

function updateGlobalBar() {
  const bar = document.getElementById('gtbar');
  const active = GT.dayIdx >= 0 && (GT.running || GT.elapsed > 0);
  bar.classList.toggle('on', active);
  document.body.style.paddingTop = active ? '40px' : '0';
  if (active) {
    document.getElementById('gtbar-time').textContent = fmtTime(GT.seconds());
    document.getElementById('gtbar-day').textContent  = DAYS[GT.dayIdx]?.name || '';
  }
}

function refreshTimerDisplay() {
  const el = document.getElementById('timer-display');
  if (!el || currentDay < 0) return;
  el.textContent = fmtTime(GT.dayIdx === currentDay ? GT.seconds() : (cache[currentDay]?.durationSeconds || 0));
}

function persistTimerForDay(dayIdx) {
  if (dayIdx < 0) return;
  const secs = GT.seconds();
  if (secs > 0) {
    db.collection('treino_sessions').doc(sessionId(dayIdx))
      .set({ durationSeconds: secs }, { merge: true }).catch(() => {});
  }
}

// ── Firestore ─────────────────────────────────────────────────────────────────
function sessionId(dayIdx) { return `${deviceId}_${getWeekStart()}_d${dayIdx}`; }
function weightsId()       { return `${deviceId}_weights`; }

function setSyncing(on) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (dot) dot.className = on ? 'sync-dot syncing' : 'sync-dot';
  if (lbl) lbl.textContent = on ? 'Sincronizando...' : 'Sincronizado';
}

async function loadAll() {
  setSyncing(true);
  try {
    const [wSnap, ...snaps] = await Promise.all([
      db.collection('treino_weights').doc(weightsId()).get(),
      ...DAYS.map((_,i) => db.collection('treino_sessions').doc(sessionId(i)).get()),
    ]);
    if (wSnap.exists) weights = wSnap.data().weights || {};
    snaps.forEach((snap, i) => { if (snap.exists) cache[i] = snap.data(); });
  } catch(e) {}
  setSyncing(false);
}

async function saveSession(dayIdx, data) {
  setSyncing(true);
  try { await db.collection('treino_sessions').doc(sessionId(dayIdx)).set(data, { merge: true }); }
  catch(e) {}
  setSyncing(false);
}

async function saveWeights() {
  try { await db.collection('treino_weights').doc(weightsId()).set({ weights }, { merge: false }); }
  catch(e) {}
}

// ── Checklist ─────────────────────────────────────────────────────────────────
function toggleEx(id) {
  if (workoutDone) return;
  checked.has(id) ? checked.delete(id) : checked.add(id);
  document.querySelector(`[data-id="${id}"]`)?.classList.toggle('checked', checked.has(id));
  updateProgress();
  scheduleSessionSave();
}

function updateProgress() {
  const total = DAYS[currentDay].total, done = checked.size;
  document.getElementById('progress-count').textContent = `${done} / ${total}`;
  const fill = document.getElementById('progress-fill');
  fill.style.width = (total > 0 ? Math.round(done/total*100) : 0) + '%';
  fill.classList.toggle('full', done === total);
  const btn = document.getElementById('finish-btn');
  if (!workoutDone) btn.disabled = done === 0;
}

function scheduleSessionSave() {
  if (autoSaveT) clearTimeout(autoSaveT);
  autoSaveT = setTimeout(() => {
    const secs = GT.dayIdx === currentDay ? GT.seconds() : (cache[currentDay]?.durationSeconds || 0);
    const data = {
      deviceId, dayIndex: currentDay, dayName: DAYS[currentDay].name,
      weekStart: getWeekStart(), checkedExercises: [...checked],
      durationSeconds: secs, updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    };
    saveSession(currentDay, data);
    cache[currentDay] = { ...(cache[currentDay] || {}), ...data };
  }, 1200);
}

function onWeightChange(exId, val) {
  weights[exId] = val;
  if (weightSaveT) clearTimeout(weightSaveT);
  weightSaveT = setTimeout(saveWeights, 1500);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  if (GT.dayIdx >= 0) persistTimerForDay(GT.dayIdx);
  currentDay = -1; workoutDone = false;
  renderHome(); show('screen-home');
}

async function openDay(idx) {
  currentDay = idx; workoutDone = false; checked = new Set();
  const day = DAYS[idx];

  setSyncing(true);
  const snap = await db.collection('treino_sessions').doc(sessionId(idx)).get();
  if (snap.exists) {
    cache[idx] = snap.data();
    (snap.data().checkedExercises || []).forEach(id => checked.add(id));
    if (snap.data().completed) workoutDone = true;
  }
  setSyncing(false);

  document.getElementById('wn-label').textContent = `Treino ${day.treino} — ${day.name}`;
  document.getElementById('wn-title').textContent  = day.title;

  const timerSecs = GT.dayIdx === idx ? GT.seconds() : (cache[idx]?.durationSeconds || 0);
  const tDisp = document.getElementById('timer-display');
  const tBtn  = document.getElementById('timer-btn');
  tDisp.textContent = fmtTime(timerSecs);
  tDisp.className   = 'timer-display' + (workoutDone ? ' finished' : (GT.running && GT.dayIdx === idx ? ' running' : ''));
  tBtn.textContent  = workoutDone ? 'Concluído' : (GT.running && GT.dayIdx === idx ? 'Pausar' : (timerSecs > 0 ? 'Continuar' : 'Iniciar'));
  tBtn.disabled     = workoutDone;

  document.getElementById('exercise-list').innerHTML = day.sections.map(sec => `
    <div class="ex-section">
      <div class="ex-sec-title">${sec.name}</div>
      ${sec.exs.map(ex => `
        <div class="ex-item ${checked.has(ex.id) ? 'checked' : ''}" data-id="${ex.id}">
          <div class="ex-check" onclick="toggleEx('${ex.id}')">
            <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-sets">${ex.sets}</div>
          </div>
          <div class="weight-wrap">
            <input class="weight-input" type="number" min="0" step="0.5" placeholder="kg"
              value="${weights[ex.id] || ''}"
              oninput="onWeightChange('${ex.id}', this.value)"
              onclick="event.stopPropagation()" />
            <span class="weight-unit">kg</span>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');

  updateProgress();
  const finBtn = document.getElementById('finish-btn');
  const undoBtn = document.getElementById('undo-btn');
  if (workoutDone) { finBtn.textContent = 'Treino já concluído!'; finBtn.disabled = true; finBtn.className = 'finish-btn done'; undoBtn.className = 'undo-btn show'; }
  else { finBtn.textContent = 'Finalizar Treino'; finBtn.disabled = checked.size === 0; finBtn.className = 'finish-btn'; undoBtn.className = 'undo-btn'; }

  show('screen-workout');
}

// ── Timer controls ────────────────────────────────────────────────────────────
function toggleTimer() {
  if (workoutDone) return;
  const tDisp = document.getElementById('timer-display');
  const tBtn  = document.getElementById('timer-btn');
  if (GT.running && GT.dayIdx === currentDay) {
    GT.pause();
    tBtn.textContent = 'Continuar';
    tDisp.classList.remove('running');
  } else {
    GT.start(currentDay);
    tBtn.textContent = 'Pausar';
    tDisp.classList.add('running');
  }
}

function resetTimer() {
  GT.reset();
  const tDisp = document.getElementById('timer-display');
  tDisp.textContent = '00:00';
  tDisp.className = 'timer-display';
  document.getElementById('timer-btn').textContent = 'Iniciar';
}

// ── Finish ────────────────────────────────────────────────────────────────────
async function finishWorkout() {
  if (workoutDone) return;
  GT.pause();
  const secs = GT.dayIdx === currentDay ? GT.elapsed : 0;
  const day  = DAYS[currentDay];
  workoutDone = true;

  const tDisp = document.getElementById('timer-display');
  tDisp.classList.remove('running'); tDisp.classList.add('finished');
  document.getElementById('timer-btn').textContent = 'Concluído';
  document.getElementById('timer-btn').disabled = true;

  // Clear global timer after finishing
  GT.elapsed = 0; GT.dayIdx = -1; GT.startMs = null; GT.running = false;
  clearInterval(GT._iv); GT._iv = null; GT.save(); updateGlobalBar();

  setSyncing(true);
  await saveSession(currentDay, {
    deviceId, dayIndex: currentDay, dayName: day.name, title: day.title,
    weekStart: getWeekStart(), checkedExercises: [...checked],
    durationSeconds: secs, exercisesDone: checked.size, exercisesTotal: day.total,
    completed: true, completedAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
  setSyncing(false);
  cache[currentDay] = { completed: true, durationSeconds: secs, exercisesDone: checked.size, exercisesTotal: day.total };

  document.getElementById('sum-sub').textContent       = `${day.name} — ${day.title}`;
  document.getElementById('sum-duration').textContent  = fmtTime(secs);
  document.getElementById('sum-exercises').textContent = `${checked.size}/${day.total}`;
  show('screen-summary');
}

async function undoFinish() {
  workoutDone = false;
  const day = DAYS[currentDay];
  setSyncing(true);
  await saveSession(currentDay, {
    deviceId, dayIndex: currentDay, dayName: day.name,
    weekStart: getWeekStart(), checkedExercises: [...checked],
    completed: false, durationSeconds: 0,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
  setSyncing(false);
  cache[currentDay] = { ...cache[currentDay], completed: false };

  // Restore timer UI
  const tDisp = document.getElementById('timer-display');
  tDisp.classList.remove('finished');
  tDisp.textContent = '00:00';
  document.getElementById('timer-btn').textContent = 'Iniciar';
  document.getElementById('timer-btn').disabled = false;

  const finBtn = document.getElementById('finish-btn');
  finBtn.textContent = 'Finalizar Treino';
  finBtn.disabled = checked.size === 0;
  finBtn.className = 'finish-btn';
  document.getElementById('undo-btn').className = 'undo-btn';
}

// ── Home ──────────────────────────────────────────────────────────────────────
function renderHome() {
  const todayIdx = todayDayIdx();
  const banner = document.getElementById('today-banner');
  if (todayIdx === -1) {
    banner.className = 'today-banner rest'; banner.onclick = null;
    document.getElementById('today-label').textContent = 'Domingo';
    document.getElementById('today-name').textContent  = 'Dia de descanso';
    document.getElementById('today-sub').textContent   = 'Você merece descansar hoje!';
    document.getElementById('today-arrow').style.background = 'var(--surface2)';
  } else {
    const day = DAYS[todayIdx], cached = cache[todayIdx];
    banner.className = 'today-banner'; banner.onclick = () => openDay(todayIdx);
    document.getElementById('today-label').textContent = 'Treino de hoje';
    document.getElementById('today-name').textContent  = `${day.name} — Treino ${day.treino}`;
    document.getElementById('today-sub').textContent   = cached?.completed
      ? `Concluído em ${fmtTime(cached.durationSeconds||0)} — ${day.title}` : day.title;
    document.getElementById('today-arrow').style.background = 'var(--accent)';
  }
  document.getElementById('week-grid').innerHTML = DAYS.map((day, i) => {
    const isToday = i === todayIdx, cached = cache[i];
    const isDone  = cached?.completed;
    const isGT    = GT.dayIdx === i && (GT.running || GT.elapsed > 0);
    const dur     = isDone ? fmtTime(cached.durationSeconds||0) : (isGT ? fmtTime(GT.seconds()) : null);
    return `<div class="day-card ${isToday?'today':''} ${isDone?'done':''} ${isGT?'active-timer':''}" onclick="openDay(${i})">
      ${isDone ? '<div class="dc-status">✓</div>' : ''}
      <div class="dc-short">${day.short}</div>
      <div class="dc-name">${day.name}</div>
      <span class="dc-tag ${day.tag}">Treino ${day.treino}</span>
      ${dur ? `<div class="dc-duration">${dur}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtTime(s) {
  s = Math.max(0, Math.floor(s||0));
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
  return h>0 ? `${h}h${String(m).padStart(2,'0')}m` : `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  GT.load();
  if (GT.running) GT._tick();
  updateGlobalBar();
  await loadAll();
  renderHome();
})();

document.addEventListener('visibilitychange', () => {
  if (document.hidden) { GT.save(); if (GT.dayIdx >= 0) persistTimerForDay(GT.dayIdx); }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/meu-treino/sw.js').catch(() => {}));
}
</script>
